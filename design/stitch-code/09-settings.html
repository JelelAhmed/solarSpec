<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-container": "#f5a623",
                        "outline": "#9f8e7a",
                        "on-tertiary": "#00344a",
                        "surface-variant": "#353534",
                        "secondary-fixed": "#86f8c9",
                        "primary-fixed-dim": "#ffb955",
                        "tertiary-container": "#3ac2ff",
                        "tertiary-fixed": "#c4e7ff",
                        "on-primary-fixed": "#291800",
                        "on-secondary-fixed": "#002115",
                        "on-tertiary-container": "#004d6a",
                        "on-tertiary-fixed-variant": "#004c69",
                        "on-tertiary-fixed": "#001e2c",
                        "secondary-container": "#26a37a",
                        "on-surface": "#e5e2e1",
                        "inverse-primary": "#835500",
                        "on-primary-fixed-variant": "#633f00",
                        "background": "#131313",
                        "surface-container-lowest": "#0e0e0e",
                        "primary": "#ffc880",
                        "error-container": "#93000a",
                        "surface-bright": "#3a3939",
                        "on-error": "#690005",
                        "surface": "#131313",
                        "on-secondary-container": "#003121",
                        "on-secondary-fixed-variant": "#00513a",
                        "surface-tint": "#ffb955",
                        "surface-container": "#201f1f",
                        "inverse-on-surface": "#313030",
                        "tertiary-fixed-dim": "#7cd0ff",
                        "on-primary-container": "#644000",
                        "inverse-surface": "#e5e2e1",
                        "surface-dim": "#131313",
                        "error": "#ffb4ab",
                        "surface-container-low": "#1c1b1b",
                        "on-error-container": "#ffdad6",
                        "secondary-fixed-dim": "#68dbae",
                        "on-background": "#e5e2e1",
                        "on-secondary": "#003827",
                        "secondary": "#68dbae",
                        "surface-container-highest": "#353534",
                        "outline-variant": "#524534",
                        "tertiary": "#9bd9ff",
                        "primary-fixed": "#ffddb4",
                        "on-primary": "#452b00",
                        "on-surface-variant": "#d7c3ae",
                        "surface-container-high": "#2a2a2a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        input:focus, select:focus {
            outline: none;
            border-bottom: 2px solid #f5a623 !important;
        }
        .tonal-layering {
            background-color: #0E0E0E;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-surface font-body min-h-screen">
<header class="sticky top-0 z-50 bg-[#0E0E0E] flex justify-between items-center w-full px-6 py-4 h-16">
<div class="flex items-center gap-4">
<button class="hover:bg-[#2A2A2A] transition-colors active:scale-95 duration-200 p-2 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-[#f5a623]" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Manrope'] font-bold text-lg tracking-tight text-[#e5e2e1]">Settings</h1>
</div>
<div class="flex items-center gap-4">
<span class="font-['Manrope'] font-black text-xl text-[#f5a623] uppercase tracking-widest">SolarSpec</span>
</div>
</header>
<main class="max-w-4xl mx-auto px-6 py-12 flex flex-col gap-12">
<section>
<div class="flex justify-between items-end mb-6">
<div>
<span class="text-[0.6875rem] font-label uppercase tracking-[0.05em] text-on-surface-variant">Profile Configuration</span>
<h2 class="text-2xl font-headline font-bold text-on-surface mt-1">Your Business</h2>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-12 gap-1">
<div class="md:col-span-8 bg-surface-container-high rounded-xl p-8 flex flex-col justify-between min-h-[200px]">
<div class="flex flex-col gap-6">
<div class="group border-b border-outline-variant/15 pb-2 transition-all">
<label class="text-[0.6875rem] font-label uppercase tracking-widest text-on-surface-variant block">Business Name</label>
<div class="text-lg font-medium text-on-surface py-1">Technical Solar Excellence Ltd.</div>
</div>
<div class="group border-b border-outline-variant/15 pb-2 transition-all">
<label class="text-[0.6875rem] font-label uppercase tracking-widest text-on-surface-variant block">Technician Name</label>
<div class="text-lg font-medium text-on-surface py-1">A. Ibrahim</div>
</div>
</div>
</div>
<div class="md:col-span-4 bg-surface-container-highest rounded-xl p-8 flex items-center justify-center relative overflow-hidden group">
<div class="absolute inset-0 bg-primary/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<div class="flex flex-col items-center gap-4">
<div class="w-20 h-20 bg-surface-container-low border border-outline-variant/20 rounded-xl flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-4xl" data-icon="business">business</span>
</div>
<span class="text-[0.6875rem] font-label uppercase tracking-widest text-on-surface-variant">Upload Logo</span>
</div>
</div>
</div>
</section>
<section>
<div class="flex justify-between items-end mb-6">
<div>
<span class="text-[0.6875rem] font-label uppercase tracking-[0.05em] text-on-surface-variant">Standard Operating Parameters</span>
<h2 class="text-2xl font-headline font-bold text-on-surface mt-1">Defaults</h2>
</div>
</div>
<div class="bg-surface-container-low rounded-xl p-8">
<div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-8">
<div class="space-y-2">
<label class="text-[0.6875rem] font-label uppercase tracking-widest text-on-surface-variant block">Battery chemistry</label>
<select class="w-full bg-surface-container-lowest border-0 border-b border-outline-variant/30 text-on-surface py-3 px-0 focus:ring-0 appearance-none font-medium">
<option>Lithium Iron Phosphate (LiFePO4)</option>
<option>Lithium Nickel Manganese Cobalt (NMC)</option>
<option>Lead Acid (AGM)</option>
</select>
</div>
<div class="space-y-2">
<label class="text-[0.6875rem] font-label uppercase tracking-widest text-on-surface-variant block">System voltage</label>
<select class="w-full bg-surface-container-lowest border-0 border-b border-outline-variant/30 text-on-surface py-3 px-0 focus:ring-0 appearance-none font-medium">
<option>48V DC</option>
<option>24V DC</option>
<option>12V DC</option>
</select>
</div>
<div class="space-y-2">
<label class="text-[0.6875rem] font-label uppercase tracking-widest text-on-surface-variant block">Inverter type</label>
<select class="w-full bg-surface-container-lowest border-0 border-b border-outline-variant/30 text-on-surface py-3 px-0 focus:ring-0 appearance-none font-medium">
<option>Hybrid Inverter</option>
<option>String Inverter</option>
<option>Microinverter</option>
</select>
</div>
<div class="space-y-2">
<label class="text-[0.6875rem] font-label uppercase tracking-widest text-on-surface-variant block">Peak sun hours</label>
<input class="w-full bg-surface-container-lowest border-0 border-b border-outline-variant/30 text-on-surface py-3 px-0 focus:ring-0 font-medium" step="0.1" type="number" value="5.5"/>
</div>
</div>
</div>
</section>
<section class="mb-24">
<div class="flex justify-between items-end mb-6">
<div>
<span class="text-[0.6875rem] font-label uppercase tracking-[0.05em] text-on-surface-variant">Platform Information</span>
<h2 class="text-2xl font-headline font-bold text-on-surface mt-1">About</h2>
</div>
</div>
<div class="flex flex-col gap-1">
<div class="flex justify-between items-center bg-surface-container-high p-6 rounded-t-xl">
<span class="text-on-surface font-medium">App version</span>
<span class="bg-surface-variant px-3 py-1 rounded text-[0.6875rem] font-label text-tertiary">v2.4.8-Stable</span>
</div>
<button class="flex justify-between items-center bg-surface-container-high p-6 group hover:bg-surface-bright transition-colors text-left">
<div class="flex flex-col">
<span class="text-on-surface font-medium">Rate SolarSpec</span>
<span class="text-xs text-on-surface-variant">Support our engineering team</span>
</div>
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors" data-icon="star">star</span>
</button>
<button class="flex justify-between items-center bg-surface-container-high p-6 rounded-b-xl group hover:bg-surface-bright transition-colors text-left">
<span class="text-on-surface font-medium">Privacy Policy</span>
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors" data-icon="open_in_new">open_in_new</span>
</button>
</div>
</section>
</main>
</body></html>
