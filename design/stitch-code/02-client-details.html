<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-container": "#f5a623",
                        "outline": "#9f8e7a",
                        "on-tertiary": "#00344a",
                        "surface-variant": "#353534",
                        "secondary-fixed": "#86f8c9",
                        "primary-fixed-dim": "#ffb955",
                        "tertiary-container": "#3ac2ff",
                        "tertiary-fixed": "#c4e7ff",
                        "on-primary-fixed": "#291800",
                        "on-secondary-fixed": "#002115",
                        "on-tertiary-container": "#004d6a",
                        "on-tertiary-fixed-variant": "#004c69",
                        "on-tertiary-fixed": "#001e2c",
                        "secondary-container": "#26a37a",
                        "on-surface": "#e5e2e1",
                        "inverse-primary": "#835500",
                        "on-primary-fixed-variant": "#633f00",
                        "background": "#131313",
                        "surface-container-lowest": "#0e0e0e",
                        "primary": "#ffc880",
                        "error-container": "#93000a",
                        "surface-bright": "#3a3939",
                        "on-error": "#690005",
                        "surface": "#131313",
                        "on-secondary-container": "#003121",
                        "on-secondary-fixed-variant": "#00513a",
                        "surface-tint": "#ffb955",
                        "surface-container": "#201f1f",
                        "inverse-on-surface": "#313030",
                        "tertiary-fixed-dim": "#7cd0ff",
                        "on-primary-container": "#644000",
                        "inverse-surface": "#e5e2e1",
                        "surface-dim": "#131313",
                        "error": "#ffb4ab",
                        "surface-container-low": "#1c1b1b",
                        "on-error-container": "#ffdad6",
                        "secondary-fixed-dim": "#68dbae",
                        "on-background": "#e5e2e1",
                        "on-secondary": "#003827",
                        "secondary": "#68dbae",
                        "surface-container-highest": "#353534",
                        "outline-variant": "#524534",
                        "tertiary": "#9bd9ff",
                        "primary-fixed": "#ffddb4",
                        "on-primary": "#452b00",
                        "on-surface-variant": "#d7c3ae",
                        "surface-container-high": "#2a2a2a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.8px",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .form-input-bottom {
            background-color: #0e0e0e;
            border: none;
            border-bottom: 1px solid #524534;
            border-radius: 0;
            transition: border-color 0.2s ease;
        }
        .form-input-bottom:focus {
            border-bottom: 2px solid #ffc880;
            box-shadow: none;
            outline: none;
        }
        .amber-gradient {
            background: linear-gradient(180deg, #ffc880 0%, #f5a623 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col">
<!-- Top Navigation Shell -->
<header class="bg-[#0E0E0E] flex justify-between items-center w-full px-6 py-4 h-16 sticky top-0 z-50">
<div class="flex items-center gap-4">
<button class="hover:bg-[#2A2A2A] transition-colors active:scale-95 duration-200 p-2 rounded-lg text-[#f5a623]">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Manrope'] font-bold text-lg tracking-tight text-[#f5a623]">SolarSpec</h1>
</div>
<div class="flex items-center gap-2">
<span class="text-xs font-label font-medium uppercase tracking-widest text-on-surface-variant">Step 01 / 06</span>
<button class="hover:bg-[#2A2A2A] transition-colors active:scale-95 duration-200 p-2 rounded-lg text-[#E5E2E1]/60">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</div>
</header>
<main class="flex-1 max-w-2xl mx-auto w-full px-6 py-8 md:py-12">
<!-- Progress Indicator -->
<div class="mb-12">
<div class="flex gap-1.5 h-1.5 w-full">
<div class="flex-1 bg-primary-container rounded-full"></div>
<div class="flex-1 bg-surface-container-highest rounded-full"></div>
<div class="flex-1 bg-surface-container-highest rounded-full"></div>
<div class="flex-1 bg-surface-container-highest rounded-full"></div>
<div class="flex-1 bg-surface-container-highest rounded-full"></div>
<div class="flex-1 bg-surface-container-highest rounded-full"></div>
</div>
<p class="mt-4 font-headline text-3xl font-extrabold tracking-tight text-on-surface">Client Details</p>
<p class="mt-2 text-on-surface-variant font-medium text-sm">INITIAL SITE ASSESSMENT DATA</p>
</div>
<!-- Form Section -->
<section class="space-y-10">
<!-- Form Grid -->
<div class="grid grid-cols-1 gap-10">
<!-- Client Name -->
<div class="group">
<label class="block text-[0.6875rem] font-label font-bold uppercase tracking-[0.1em] text-on-surface-variant mb-1 group-focus-within:text-primary transition-colors" for="client_name">
                        Client Name
                    </label>
<input class="form-input-bottom w-full py-3 text-on-surface placeholder:text-surface-variant font-medium text-lg" id="client_name" placeholder="Enter primary contact name" type="text"/>
</div>
<!-- Site Address -->
<div class="group">
<label class="block text-[0.6875rem] font-label font-bold uppercase tracking-[0.1em] text-on-surface-variant mb-1 group-focus-within:text-primary transition-colors" for="site_address">
                        Site Address
                    </label>
<div class="relative">
<input class="form-input-bottom w-full py-3 pr-10 text-on-surface placeholder:text-surface-variant font-medium text-lg" id="site_address" placeholder="Physical installation location" type="text"/>
<span class="material-symbols-outlined absolute right-0 top-3 text-on-surface-variant" data-icon="location_on">location_on</span>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-10">
<!-- Date Field -->
<div class="group">
<label class="block text-[0.6875rem] font-label font-bold uppercase tracking-[0.1em] text-on-surface-variant mb-1 group-focus-within:text-primary transition-colors" for="date">
                            Assessment Date
                        </label>
<input class="form-input-bottom w-full py-3 text-on-surface font-medium text-lg appearance-none" id="date" type="date" value="2024-05-20"/>
</div>
<!-- Technician Name (Pre-filled) -->
<div class="group opacity-60">
<label class="block text-[0.6875rem] font-label font-bold uppercase tracking-[0.1em] text-on-surface-variant mb-1" for="tech_name">
                            Assigned Technician
                        </label>
<input class="form-input-bottom w-full py-3 text-on-surface-variant font-medium text-lg cursor-not-allowed" id="tech_name" readonly="" type="text" value="A. Ibrahim"/>
</div>
</div>
</div>
<!-- Secondary Contextual Info -->
<div class="p-6 bg-surface-container-low rounded-xl flex items-start gap-4">
<span class="material-symbols-outlined text-tertiary mt-1" data-icon="info">info</span>
<div>
<h4 class="text-xs font-bold uppercase tracking-wider text-on-surface">Precision Requirements</h4>
<p class="text-sm text-on-surface-variant mt-1 leading-relaxed">Ensure the site address is accurate for your records and the client proposal.</p>
</div>
</div>
<!-- Visual Anchor / Hero Texture -->
</section>
</main>
<!-- Bottom Action Shell -->
<footer class="p-6 md:px-12 md:pb-12 mt-auto">
<div class="max-w-2xl mx-auto">
<button class="amber-gradient w-full py-5 rounded-lg font-headline font-extrabold text-on-primary-container uppercase tracking-[0.2em] shadow-lg active:scale-95 transition-transform duration-200">
                Next Step
            </button>
<p class="text-center text-[10px] text-on-surface-variant mt-6 uppercase tracking-widest font-medium">
                Review all fields before proceeding to Step 2: System Specifications
            </p>
</div>
</footer>
</body></html>
